<!DOCTYPE html>
<!--
  Bell Test No-Signaling Analysis — Live Viewer
  SISO Architecture: DOM is the source of truth.
  SSE events → Stream/Gate → targeted DOM mutations.
  No framework. No virtual DOM.
  GPL v3
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISO Bell Test Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c141f; --bg2:#0f1922; --bg3:#162029; --bg4:#1a2d3d;
  --border:#3d6d85; --text:#b8c5d6; --dim:#8a9db0;
  --cyan:#18d6e0; --gold:#fde68a; --green:#34d399; --red:#f87171;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}

.header{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border)}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700}
.header .sub{font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:1px}

.controls{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--bg2)}
.controls select{font-family:inherit;font-size:11px;padding:4px 8px;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:3px;max-width:400px}
.controls button{font-family:inherit;font-size:11px;padding:4px 12px;background:var(--cyan);color:var(--bg);border:none;border-radius:3px;cursor:pointer;font-weight:700}
.controls button:disabled{opacity:0.4;cursor:not-allowed}
.controls .status{font-size:10px;color:var(--dim);margin-left:8px}

.layout{display:flex;height:calc(100vh - 88px)}

/* Gate log — left panel */
.log-panel{width:320px;border-right:1px solid var(--border);display:flex;flex-direction:column}
.log-head{padding:6px 10px;font-size:10px;color:var(--cyan);text-transform:uppercase;letter-spacing:1.5px;border-bottom:1px solid var(--border);background:rgba(24,214,224,0.04)}
.log-body{flex:1;overflow-y:auto;padding:4px}
.log-entry{padding:3px 6px;font-size:10px;border-bottom:1px solid rgba(61,109,133,0.15);line-height:1.5}
.log-entry .gate-name{color:var(--cyan);font-weight:700}
.log-entry .gate-enter{color:var(--green)}
.log-entry .gate-exit{color:var(--gold)}
.log-entry .gate-msg{color:var(--dim)}
.log-entry .flag{color:var(--gold);font-weight:700}
.log-entry .err{color:var(--red)}
.log-entry .ts{color:rgba(138,157,176,0.5);margin-right:4px}

/* Results — right panel */
.results{flex:1;overflow-y:auto;padding:12px 16px}
.panel{background:var(--bg3);border:1px solid var(--border);border-radius:4px;margin-bottom:8px}
.panel-head{padding:5px 8px;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;border-bottom:1px solid var(--border)}
.panel-head.cyan{color:var(--cyan);background:rgba(24,214,224,0.04)}
.panel-head.gold{color:var(--gold);background:rgba(253,230,138,0.04)}
.panel-head.green{color:var(--green);background:rgba(52,211,153,0.04)}
.panel-body{padding:8px}
.panel.hidden{display:none}

/* Count tables */
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:4px 5px;text-align:center;color:var(--dim);border-bottom:1px solid rgba(61,109,133,0.4);font-weight:400;font-size:9px;letter-spacing:.5px;text-transform:uppercase}
td{padding:4px 5px;text-align:center;border-bottom:1px solid rgba(61,109,133,0.2)}
th:first-child,td:first-child{text-align:left}

/* Delta display */
.delta-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.delta-label{width:50px;font-size:10px;color:var(--dim);text-align:right}
.delta-bar-bg{position:relative;width:260px;height:20px;background:var(--bg);border-radius:3px;overflow:hidden}
.delta-zero{position:absolute;left:50%;top:0;width:1px;height:100%;background:rgba(255,255,255,0.12)}
.delta-ci{position:absolute;top:3px;height:14px;border-radius:2px}
.delta-marker{position:absolute;top:2px;width:3px;height:16px;border-radius:2px}
.delta-val{font-size:9px;color:var(--dim);min-width:80px}
.delta-flag{font-size:9px;min-width:60px}

/* Stat rows */
.srow{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px solid rgba(61,109,133,0.2)}
.srow:last-child{border-bottom:none}
.srow .sl{color:var(--dim)}

/* Verdict */
.verdict-label{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700}
.verdict-flags{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;font-size:10px}
.verdict-flags span{color:var(--gold)}

/* Windowed chart */
.window-chart{height:120px;position:relative;background:var(--bg);border-radius:3px;margin-top:6px}
.window-chart canvas{width:100%;height:100%}

/* Progress */
.progress-bar{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;background:var(--cyan);transition:width 0.2s;width:0%}

@media(max-width:800px){
  .layout{flex-direction:column}
  .log-panel{width:100%;height:200px;border-right:none;border-bottom:1px solid var(--border)}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>No-Signaling Residual Analysis</h1>
    <div class="sub">SISO — Live Gate-by-Gate Eliminative Pipeline</div>
  </div>
</div>

<div class="controls">
  <select id="dataset-select"><option value="">Loading datasets...</option></select>
  <button id="run-btn" disabled>Run Analysis</button>
  <span class="status" id="status"></span>
</div>

<div class="layout">
  <!-- Gate log -->
  <div class="log-panel">
    <div class="log-head">Gate Log</div>
    <div class="log-body" id="log"></div>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <!-- Load -->
    <div class="panel hidden" id="p-load">
      <div class="panel-head cyan">Dataset</div>
      <div class="panel-body" id="load-body"></div>
    </div>

    <!-- Count tables -->
    <div class="panel hidden" id="p-counts">
      <div class="panel-head cyan">Gate 1 — Count Tables</div>
      <div class="panel-body" id="counts-body"></div>
    </div>

    <!-- Marginals -->
    <div class="panel hidden" id="p-marginals">
      <div class="panel-head cyan">Gate 2 — Marginal Probabilities</div>
      <div class="panel-body" id="marginals-body"></div>
    </div>

    <!-- Deltas -->
    <div class="panel hidden" id="p-deltas">
      <div class="panel-head green">Gate 3 — No-Signaling Deltas</div>
      <div class="panel-body" id="deltas-body"></div>
    </div>

    <!-- Permutation -->
    <div class="panel hidden" id="p-perm">
      <div class="panel-head cyan">Gate 4 — Permutation Test</div>
      <div class="panel-body" id="perm-body"></div>
    </div>

    <!-- Bootstrap -->
    <div class="panel hidden" id="p-boot">
      <div class="panel-head cyan">Gate 5 — Bootstrap CIs</div>
      <div class="panel-body" id="boot-body"></div>
    </div>

    <!-- Windowed -->
    <div class="panel hidden" id="p-windowed">
      <div class="panel-head cyan">Gate 6 — Temporal Analysis</div>
      <div class="panel-body" id="windowed-body"></div>
    </div>

    <!-- Verdict -->
    <div class="panel hidden" id="p-verdict">
      <div class="panel-head gold">Verdict</div>
      <div class="panel-body" id="verdict-body"></div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
// SISO: Stream / Gate / Event
// DOM is the source of truth.
// SSE events flow in → stream.emit() →
// gates make targeted DOM mutations.
// ════════════════════════════════════════

function Event(type, data) { this.type = type; this.data = data; }

function Stream() { this.gates = {}; this.count = 0; }
Stream.prototype.register = function(sig, fn) { this.gates[sig] = fn; };
Stream.prototype.emit = function(evt) {
  this.count++;
  var g = this.gates[evt.type];
  if (g) g(evt, this);
};

var stream = new Stream();
var startTime = 0;


// ════════════════════════════════════════
// GATE: LogGate — every SSE event → log panel
// ════════════════════════════════════════

stream.register('gate', function(evt) {
  var d = evt.data;
  var log = document.getElementById('log');
  var el = document.createElement('div');
  el.className = 'log-entry';
  var elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
  var cls = d.action === 'enter' ? 'gate-enter' : 'gate-exit';
  var arrow = d.action === 'enter' ? '→' : '←';
  el.innerHTML = '<span class="ts">' + elapsed + 's</span>'
    + '<span class="gate-name">' + esc(d.gate) + '</span> '
    + '<span class="' + cls + '">' + arrow + '</span> '
    + '<span class="gate-msg">' + esc(d.msg) + '</span>';
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
});

stream.register('flag', function(evt) {
  var d = evt.data;
  var log = document.getElementById('log');
  var el = document.createElement('div');
  el.className = 'log-entry';
  var elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
  el.innerHTML = '<span class="ts">' + elapsed + 's</span>'
    + '<span class="flag">⚑ ' + esc(d.delta) + ': ' + esc(d.msg) + '</span>';
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
});

stream.register('error', function(evt) {
  var log = document.getElementById('log');
  var el = document.createElement('div');
  el.className = 'log-entry';
  el.innerHTML = '<span class="err">ERROR: ' + esc(evt.data.msg) + '</span>';
  log.appendChild(el);
  document.getElementById('status').textContent = 'Error';
  document.getElementById('run-btn').disabled = false;
});


// ════════════════════════════════════════
// GATE: LoadGate — dataset info → load panel
// ════════════════════════════════════════

stream.register('load', function(evt) {
  var d = evt.data;
  show('p-load');
  document.getElementById('load-body').innerHTML =
    srow('File', d.file) +
    srow('Size', (d.size / 1e6).toFixed(1) + ' MB') +
    srow('Trials', d.nTrials.toLocaleString());
});


// ════════════════════════════════════════
// GATE: CountsGate — count tables → table DOM
// ════════════════════════════════════════

stream.register('counts', function(evt) {
  var d = evt.data;
  show('p-counts');
  var html = '<table><thead><tr><th>Settings</th><th>++</th><th>+−</th><th>−+</th><th>−−</th><th>Total</th></tr></thead><tbody>';
  for (var ab of ['11','12','21','22']) {
    var t = d.tables[ab];
    html += '<tr><td style="color:var(--cyan)">(' + ab[0] + ',' + ab[1] + ')</td>'
      + '<td>' + t.pp.toLocaleString() + '</td>'
      + '<td>' + t.pm.toLocaleString() + '</td>'
      + '<td>' + t.mp.toLocaleString() + '</td>'
      + '<td>' + t.mm.toLocaleString() + '</td>'
      + '<td style="color:var(--dim)">' + (t.pp+t.pm+t.mp+t.mm).toLocaleString() + '</td></tr>';
  }
  html += '</tbody></table>';
  html += '<div style="font-size:10px;color:var(--dim);margin-top:6px">Total N = ' + d.N.toLocaleString() + '</div>';
  document.getElementById('counts-body').innerHTML = html;
});


// ════════════════════════════════════════
// GATE: MarginalsGate — P(x|a,b) → display
// ════════════════════════════════════════

stream.register('marginals', function(evt) {
  var d = evt.data;
  show('p-marginals');
  var html = '<table><thead><tr><th></th><th>(1,1)</th><th>(1,2)</th><th>(2,1)</th><th>(2,2)</th></tr></thead><tbody>';
  html += '<tr><td style="color:var(--dim)">P(alice=+|a,b)</td>';
  for (var ab of ['11','12','21','22']) html += '<td>' + d.alice[ab].toFixed(8) + '</td>';
  html += '</tr><tr><td style="color:var(--dim)">P(bob=+|a,b)</td>';
  for (var ab of ['11','12','21','22']) html += '<td>' + d.bob[ab].toFixed(8) + '</td>';
  html += '</tr></tbody></table>';
  document.getElementById('marginals-body').innerHTML = html;
});


// ════════════════════════════════════════
// GATE: DeltasGate — no-signaling residuals → bars
// ════════════════════════════════════════

stream.register('deltas', function(evt) {
  var d = evt.data;
  show('p-deltas');

  var maxR = 0;
  for (var i = 0; i < 4; i++) {
    maxR = Math.max(maxR, Math.abs(d.deltas[i]) + d.standardErrors[i] * 2);
  }
  maxR *= 1.3;

  var html = '';
  for (var i = 0; i < 4; i++) {
    var W = 260, C = W/2;
    var scale = W / (2 * maxR);
    var dX = C + d.deltas[i] * scale;
    var seLoX = C + (d.deltas[i] - d.standardErrors[i] * 2) * scale;
    var seHiX = C + (d.deltas[i] + d.standardErrors[i] * 2) * scale;
    var seW = seHiX - seLoX;
    var sig = Math.abs(d.zScores[i]) > 2;
    var mkCol = sig ? 'var(--gold)' : 'var(--cyan)';
    var ciCol = sig ? 'rgba(253,230,138,0.2)' : 'rgba(24,214,224,0.12)';
    var ciBorder = sig ? '1px solid rgba(253,230,138,0.4)' : '1px solid rgba(24,214,224,0.15)';

    html += '<div class="delta-row">'
      + '<div class="delta-label">' + d.labels[i] + '</div>'
      + '<div class="delta-bar-bg">'
      + '<div class="delta-zero"></div>'
      + '<div class="delta-ci" style="left:' + Math.max(0,seLoX) + 'px;width:' + Math.min(seW,W) + 'px;background:' + ciCol + ';border:' + ciBorder + '"></div>'
      + '<div class="delta-marker" style="left:' + (dX-1.5) + 'px;background:' + mkCol + '"></div>'
      + '</div>'
      + '<div class="delta-val">' + fmtSci(d.deltas[i]) + '  z=' + d.zScores[i].toFixed(2) + '</div>'
      + '<div class="delta-flag" style="color:' + (sig ? 'var(--gold)' : 'var(--dim)') + '">' + (sig ? '⚑ |z|>' + Math.abs(d.zScores[i]).toFixed(1) : '') + '</div>'
      + '</div>';
  }

  html += srow('Combined ‖Δ‖', fmtSci(d.magnitude));
  html += srow('χ² (4 df)', d.chiSq.toFixed(4));

  document.getElementById('deltas-body').innerHTML = html;
});


// ════════════════════════════════════════
// GATE: PermGate — permutation result
// ════════════════════════════════════════

stream.register('permutation', function(evt) {
  var d = evt.data;
  show('p-perm');
  var sig = d.pValue < 0.01 ? 'SIGNIFICANT (p < 0.01)' : d.pValue < 0.05 ? 'SUGGESTIVE (p < 0.05)' : 'NOT SIGNIFICANT';
  var sigCol = d.pValue < 0.01 ? 'var(--red)' : d.pValue < 0.05 ? 'var(--gold)' : 'var(--dim)';
  document.getElementById('perm-body').innerHTML =
    srow('Permutations', d.nPermutations.toLocaleString()) +
    srow('p-value', '<span style="color:' + sigCol + ';font-weight:700">' + d.pValue.toFixed(6) + '</span>') +
    srow('Observed ‖Δ‖', fmtSci(d.observedMagnitude)) +
    srow('Null median', fmtSci(d.nullMedian)) +
    srow('Null 95th', fmtSci(d.null95)) +
    srow('Null 99th', fmtSci(d.null99)) +
    srow('Assessment', '<span style="color:' + sigCol + '">' + sig + '</span>');
});


// ════════════════════════════════════════
// GATE: BootGate — bootstrap CIs with bars
// ════════════════════════════════════════

stream.register('bootstrap', function(evt) {
  var d = evt.data;
  show('p-boot');

  var html = '<div style="font-size:10px;color:var(--dim);margin-bottom:6px">' + d.nResamples.toLocaleString() + ' resamples, ' + (d.ciLevel*100).toFixed(0) + '% CIs</div>';

  // Find max range for scaling
  var maxR = 0;
  for (var i = 0; i < 4; i++) {
    maxR = Math.max(maxR, Math.abs(d.deltaCIs[i].lo), Math.abs(d.deltaCIs[i].hi));
  }
  maxR *= 1.3;

  for (var i = 0; i < 4; i++) {
    var ci = d.deltaCIs[i];
    var excl = !d.zeroInCI[i];
    var W = 260, C = W/2;
    var scale = W / (2 * maxR);
    var ciLoX = Math.max(0, C + ci.lo * scale);
    var ciHiX = Math.min(W, C + ci.hi * scale);
    var medX = C + ci.median * scale;
    var mkCol = excl ? 'var(--gold)' : 'var(--cyan)';
    var ciCol = excl ? 'rgba(253,230,138,0.25)' : 'rgba(24,214,224,0.12)';
    var ciBorder = excl ? '1px solid rgba(253,230,138,0.5)' : '1px solid rgba(24,214,224,0.15)';

    html += '<div class="delta-row">'
      + '<div class="delta-label">' + d.labels[i] + '</div>'
      + '<div class="delta-bar-bg">'
      + '<div class="delta-zero"></div>'
      + '<div class="delta-ci" style="left:' + ciLoX + 'px;width:' + (ciHiX-ciLoX) + 'px;background:' + ciCol + ';border:' + ciBorder + '"></div>'
      + '<div class="delta-marker" style="left:' + (medX-1.5) + 'px;background:' + mkCol + '"></div>'
      + '</div>'
      + '<div class="delta-val">[' + fmtSci(ci.lo) + ', ' + fmtSci(ci.hi) + ']</div>'
      + '<div class="delta-flag" style="color:' + (excl ? 'var(--gold)' : '') + '">' + (excl ? '★ excl 0' : '') + '</div>'
      + '</div>';
  }

  var nExcl = d.zeroInCI.filter(function(x){return !x;}).length;
  html += '<div style="margin-top:6px;font-size:11px;color:' + (nExcl > 0 ? 'var(--gold)' : 'var(--dim)') + '">'
    + nExcl + '/4 confidence intervals exclude zero</div>';

  document.getElementById('boot-body').innerHTML = html;
});


// ════════════════════════════════════════
// GATE: WindowedGate — temporal analysis
// ════════════════════════════════════════

stream.register('windowed_progress', function(evt) {
  var d = evt.data;
  show('p-windowed');
  var pct = (d.completed / d.total * 100).toFixed(0);
  document.getElementById('windowed-body').innerHTML =
    '<div style="font-size:10px;color:var(--dim)">Processing window ' + d.completed + '/' + d.total + '</div>'
    + '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
});

stream.register('windowed', function(evt) {
  var d = evt.data;
  show('p-windowed');

  var verdictCol = d.temporalVerdict === 'STATIONARY' ? 'var(--green)'
    : d.temporalVerdict === 'DRIFT' ? 'var(--red)'
    : d.temporalVerdict === 'AUTOCORRELATED' ? 'var(--gold)'
    : 'var(--dim)';

  var html = '<div style="font-family:\'Space Grotesk\',sans-serif;font-size:18px;font-weight:700;color:' + verdictCol + '">' + d.temporalVerdict + '</div>';
  html += '<div style="font-size:10px;color:var(--dim);margin:6px 0">' + d.nWindows + ' time windows, AC threshold = ' + d.acThreshold.toFixed(4) + '</div>';

  // Stats table
  html += '<table><thead><tr><th>Delta</th><th>Mean</th><th>AC(1)</th><th>Trend R²</th></tr></thead><tbody>';
  for (var i = 0; i < d.deltaStats.length; i++) {
    var s = d.deltaStats[i];
    var acSig = Math.abs(s.autocorrelation_lag1) > d.acThreshold;
    var acCol = acSig ? 'var(--gold)' : 'var(--dim)';
    html += '<tr>'
      + '<td style="text-align:left;color:var(--dim)">' + s.label + '</td>'
      + '<td>' + fmtSci(s.mean) + '</td>'
      + '<td style="color:' + acCol + '">' + s.autocorrelation_lag1.toFixed(4) + '</td>'
      + '<td>' + s.trendR2.toFixed(4) + '</td>'
      + '</tr>';
  }
  html += '</tbody></table>';

  // Windowed delta chart — Δ_B(2) across windows
  if (d.windowDeltas && d.windowDeltas.length > 0) {
    html += '<div style="font-size:10px;color:var(--dim);margin-top:10px">Δ_B(2) across ' + d.nWindows + ' time windows:</div>';
    html += renderWindowChart(d.windowDeltas, 3); // index 3 = Δ_B(2)
  }

  document.getElementById('windowed-body').innerHTML = html;
});


// ════════════════════════════════════════
// GATE: VerdictGate — final verdict
// ════════════════════════════════════════

stream.register('verdict', function(evt) {
  var d = evt.data;
  show('p-verdict');
  var html = '<div class="verdict-flags">';
  for (var i = 0; i < d.flags.length; i++) {
    html += '<span>' + esc(d.flags[i]) + '</span>';
  }
  html += '</div>';

  if (d.summary) {
    html += '<div style="margin-top:10px">';
    html += srow('File', d.summary.file);
    html += srow('N', d.summary.N.toLocaleString());
    html += srow('‖Δ‖', fmtSci(d.summary.magnitude));
    html += srow('χ²', d.summary.chiSq.toFixed(4));
    if (d.summary.permP !== null) {
      var pCol = d.summary.permP < 0.05 ? 'var(--gold)' : 'var(--dim)';
      html += srow('Permutation p', '<span style="color:' + pCol + '">' + d.summary.permP.toFixed(6) + '</span>');
    }
    html += srow('CIs excluding zero', d.summary.nCIexcludeZero + '/4');
    html += '</div>';
  }

  document.getElementById('verdict-body').innerHTML = html;
});

stream.register('complete', function(evt) {
  document.getElementById('status').textContent = 'Complete (' + ((Date.now() - startTime) / 1000).toFixed(1) + 's)';
  document.getElementById('run-btn').disabled = false;
});


// ════════════════════════════════════════
// GATE: DatasetGate — populate selector
// ════════════════════════════════════════

stream.register('datasets', function(evt) {
  var d = evt.data;
  var sel = document.getElementById('dataset-select');
  sel.innerHTML = '';

  if (d.binaries.length === 0) {
    sel.innerHTML = '<option value="">No .bin files found</option>';
    return;
  }

  for (var i = 0; i < d.binaries.length; i++) {
    var f = d.binaries[i];
    var opt = document.createElement('option');
    opt.value = f.path;
    opt.textContent = f.name + ' (' + (f.nTrials / 1e6).toFixed(1) + 'M trials)';
    sel.appendChild(opt);
  }

  document.getElementById('run-btn').disabled = false;
});


// ════════════════════════════════════════
// Helpers — pure, no DOM access
// ════════════════════════════════════════

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

function fmtSci(x) {
  if (x === 0) return '0';
  if (Math.abs(x) < 0.001) return x.toExponential(3);
  return x.toFixed(6);
}

function srow(label, value) {
  return '<div class="srow"><span class="sl">' + label + '</span><span>' + value + '</span></div>';
}

function show(id) {
  document.getElementById(id).classList.remove('hidden');
}

function renderWindowChart(windowDeltas, deltaIdx) {
  var values = windowDeltas.map(function(w) { return w.deltas[deltaIdx]; });
  var min = Math.min.apply(null, values);
  var max = Math.max.apply(null, values);
  var range = max - min || 1e-10;
  var W = 600, H = 100, pad = 2;

  var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:120px;display:block;margin-top:4px">';

  // Zero line
  var zeroY = H - pad - ((0 - min) / range) * (H - 2 * pad);
  if (zeroY > pad && zeroY < H - pad) {
    svg += '<line x1="0" y1="' + zeroY + '" x2="' + W + '" y2="' + zeroY + '" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>';
  }

  // Mean line
  var mean = values.reduce(function(s,v){return s+v;}, 0) / values.length;
  var meanY = H - pad - ((mean - min) / range) * (H - 2 * pad);
  svg += '<line x1="0" y1="' + meanY + '" x2="' + W + '" y2="' + meanY + '" stroke="rgba(24,214,224,0.4)" stroke-width="1" stroke-dasharray="4,4"/>';

  // Bars
  var barW = (W - pad * 2) / values.length;
  for (var i = 0; i < values.length; i++) {
    var v = values[i];
    var x = pad + i * barW;
    var y = H - pad - ((v - min) / range) * (H - 2 * pad);
    var col = v >= 0 ? 'rgba(52,211,153,0.6)' : 'rgba(248,113,113,0.6)';
    // Draw bar from zero line to value
    var barTop = Math.min(y, zeroY);
    var barH = Math.abs(y - zeroY);
    svg += '<rect x="' + x + '" y="' + barTop + '" width="' + Math.max(barW - 1, 1) + '" height="' + Math.max(barH, 0.5) + '" fill="' + col + '"/>';
  }

  svg += '</svg>';
  return svg;
}


// ════════════════════════════════════════
// INIT — fetch datasets, bind controls
// ════════════════════════════════════════

function loadDatasets() {
  fetch('/api/datasets')
    .then(function(r) { return r.json(); })
    .then(function(d) { stream.emit(new Event('datasets', d)); })
    .catch(function(e) {
      document.getElementById('dataset-select').innerHTML = '<option value="">Error loading datasets</option>';
    });
}

document.getElementById('run-btn').addEventListener('click', function() {
  var filePath = document.getElementById('dataset-select').value;
  if (!filePath) return;

  // Reset
  document.getElementById('log').innerHTML = '';
  ['p-load','p-counts','p-marginals','p-deltas','p-perm','p-boot','p-windowed','p-verdict'].forEach(function(id) {
    document.getElementById(id).classList.add('hidden');
  });
  document.getElementById('run-btn').disabled = true;
  document.getElementById('status').textContent = 'Running...';
  startTime = Date.now();

  // Log the start
  var log = document.getElementById('log');
  var el = document.createElement('div');
  el.className = 'log-entry';
  el.innerHTML = '<span class="ts">0.0s</span><span class="gate-name">Pipeline</span> <span class="gate-enter">→</span> <span class="gate-msg">Starting analysis of ' + esc(filePath.split('/').pop()) + '</span>';
  log.appendChild(el);

  // Connect SSE
  var sse = new EventSource('/api/analyze?file=' + encodeURIComponent(filePath) + '&windows=100');

  // Route every SSE event type through the SISO stream
  var eventTypes = ['gate', 'load', 'counts', 'marginals', 'deltas', 'flag',
                    'permutation', 'bootstrap', 'windowed_progress', 'windowed',
                    'verdict', 'complete', 'error'];

  eventTypes.forEach(function(type) {
    sse.addEventListener(type, function(e) {
      var data = JSON.parse(e.data);
      stream.emit(new Event(type, data));

      if (type === 'complete' || type === 'error') {
        sse.close();
      }
    });
  });

  sse.onerror = function() {
    document.getElementById('status').textContent = 'Connection lost';
    document.getElementById('run-btn').disabled = false;
    sse.close();
  };
});

// Load datasets on page load
loadDatasets();

// Expose for console
window.stream = stream;
window.sampleHere = function() { return { events: stream.count }; };
</script>
